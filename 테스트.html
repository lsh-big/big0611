<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집찾go AI</title>

<style>
:root{
  --primary:#1E88FF;
  --accent:#17D4B3;
  --dark:#0F172A;
  --gray:#64748B;
  --bg:#F8FAFC;
  --white:#FFFFFF;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Pretendard",sans-serif;
}

body{
  background:var(--bg);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* Header */
header{
  height:70px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid #E5E7EB;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:40px;
}

.logo h2{
  color:var(--dark);
}

.login-btn{
  background:transparent;
  border:none;
  font-size:15px;
  cursor:pointer;
  color:var(--dark);
}

/* Main */

main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.chat-wrapper{
  width:100%;
  max-width:900px;
  height:75vh;
  background:white;
  border-radius:30px;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Chat */

.chat-body{
  flex:1;
  padding:30px;
  overflow-y:auto;
}

.ai-message{
  max-width:80%;
  background:#F1F5F9;
  color:var(--dark);
  padding:18px;
  border-radius:20px;
  line-height:1.7;
  margin-bottom:20px;
}

.ai-message h3{
  margin-bottom:10px;
}

.suggestions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

.suggestions button{
  border:none;
  background:#E8F2FF;
  color:var(--primary);
  padding:10px 14px;
  border-radius:30px;
  cursor:pointer;
  font-size:14px;
}

/* Input */

.chat-input{
  border-top:1px solid #E5E7EB;
  padding:15px;
  display:flex;
  gap:10px;
}

.chat-input input{
  flex:1;
  border:none;
  background:#F8FAFC;
  border-radius:16px;
  padding:16px;
  font-size:16px;
  outline:none;
}

.chat-input button{
  border:none;
  padding:16px 24px;
  border-radius:16px;
  color:white;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(
      135deg,
      #1E88FF,
      #17D4B3
  );
}

/* Mobile */

@media(max-width:768px){

  header{
    padding:0 16px;
  }

  .logo h2{
    font-size:18px;
  }

  .chat-wrapper{
    height:85vh;
    border-radius:20px;
  }

  .chat-body{
    padding:20px;
  }

  .ai-message{
    max-width:100%;
    font-size:15px;
  }

  .chat-input{
    flex-direction:column;
  }

  .chat-input button{
    width:100%;
  }
}
</style>
</head>
<body>

<header>

  <div class="logo">
    <!-- 로고 이미지 경로 -->
    <img src="images/logo.png" alt="집찾go">
    <h2>집찾go AI</h2>
  </div>

  <button class="login-btn">로그인</button>

</header>

<main>

  <div class="chat-wrapper">

    <div class="chat-body">

      <div class="ai-message">

        <h3>🏠 안녕하세요, 집찾go AI입니다.</h3>

        원하는 집 조건을 편하게 이야기해주세요.

        <br><br>

        예를 들어,

        <br>• 강남 출퇴근 30분 이내
        <br>• 전세 3억 이하
        <br>• 반려견 가능
        <br>• 신혼부부 추천
        <br>• 초등학교 가까운 곳

        <div class="suggestions">
          <button>강남 출퇴근 30분</button>
          <button>전세 3억 이하</button>
          <button>신혼부부 추천</button>
          <button>반려동물 가능</button>
        </div>

      </div>

    </div>

    <div class="chat-input">
      <input
        type="text"
        placeholder="원하는 집 조건을 입력하세요..."
      >
      <button>전송</button>
    </div>

  </div>

</main>

</body>
</html>
