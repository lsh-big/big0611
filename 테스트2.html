<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Pretendard,sans-serif;
}

body{
height:100vh;
background:#F8FAFC;
overflow:hidden;
}

header{
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:white;
border-bottom:1px solid #E5E7EB;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:42px;
}

.container{
height:calc(100vh - 70px);
display:flex;
}

/* 좌측 */

.sidebar{
width:260px;
background:white;
border-right:1px solid #E5E7EB;
padding:20px;
}

.new-chat{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#1E88FF;
color:white;
cursor:pointer;
}

.history{
margin-top:20px;
}

.history-item{
padding:14px;
margin-bottom:10px;
background:#F1F5F9;
border-radius:12px;
cursor:pointer;
}

/* 중앙 */

.chat-section{
flex:1;
display:flex;
flex-direction:column;
}

.chat-body{
flex:1;
padding:30px;
overflow:auto;
}

.ai-msg{
max-width:700px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.chat-input{
padding:20px;
display:flex;
gap:10px;
background:white;
border-top:1px solid #E5E7EB;
}

.chat-input input{
flex:1;
padding:15px;
border:none;
background:#F1F5F9;
border-radius:12px;
}

.chat-input button{
padding:15px 25px;
border:none;
border-radius:12px;
background:linear-gradient(
135deg,
#1E88FF,
#17D4B3
);
color:white;
}

/* 우측 */

.result-section{
width:400px;
background:white;
border-left:1px solid #E5E7EB;
display:flex;
flex-direction:column;
}

#map{
height:45%;
background:#E2E8F0;
display:flex;
justify-content:center;
align-items:center;
font-weight:700;
}

.property-list{
flex:1;
overflow:auto;
padding:15px;
}

.property-card{
background:#F8FAFC;
border-radius:15px;
overflow:hidden;
margin-bottom:15px;
}

.property-card img{
width:100%;
height:180px;
object-fit:cover;
}

.property-card h4{
padding:10px 15px 5px;
}

.property-card p{
padding:0 15px 15px;
color:#1E88FF;
font-weight:700;
}    
.top-menu{
    display:flex;
    gap:30px;
    align-items:center;
}

.top-menu a{
    text-decoration:none;
    color:#0F172A;
    font-weight:600;
    transition:.2s;
}

.top-menu a:hover{
    color:#1E88FF;
}
.customer-box{
    margin-top:30px;
    background:#F8FAFC;
    padding:18px;
    border-radius:15px;
}

.customer-box h4{
    margin-bottom:10px;
}

.customer-box p{
    margin-bottom:8px;
    color:#64748B;
}

.customer-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1E88FF;
    color:white;
    cursor:pointer;
}
.market-box{
    margin:15px;
    padding:18px;
    background:#F8FAFC;
    border-radius:15px;
}

.market-box h3{
    margin-bottom:15px;
}

.market-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}

.up{
    color:#1E88FF;
    font-weight:700;
}
/* =========================
   MOBILE
========================= */

@media (max-width:768px){

    body{
        overflow:hidden;
    }

    header{
        height:60px;
        padding:0 15px;
    }

    .top-menu{
        display:none;
    }

    .container{
        height:calc(100vh - 120px);
        display:block;
    }

    /* 좌측메뉴 숨김 */
    .sidebar{
        display:none;
    }

    /* AI채팅 전체화면 */
    .chat-section{
        width:100%;
        height:100%;
    }

    .chat-body{
        padding:15px;
    }

    .ai-msg{
        max-width:100%;
        font-size:14px;
        padding:18px;
    }

    .chat-input{
        padding:10px;
    }

    .chat-input input{
        font-size:16px;
    }

    /* 우측패널 숨김 */
    .result-section{
        display:none;
    }

    /* 하단 메뉴 */
    .mobile-nav{
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        height:60px;

        background:white;

        display:flex;
        justify-content:space-around;
        align-items:center;

        border-top:1px solid #E5E7EB;

        z-index:999;
    }

    .mobile-nav a{
        text-decoration:none;
        color:#64748B;
        font-size:13px;
        text-align:center;
    }

    .mobile-nav a.active{
        color:#1E88FF;
        font-weight:700;
    }

}
</style>




    
</head>
<body>
    
</body>
</html>
