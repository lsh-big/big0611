<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>집찾go</title>

<style>

:root{
    --primary:#1E88FF;
    --accent:#17D4B3;
    --dark:#0F172A;
    --gray:#64748B;
    --light:#F8FAFC;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Pretendard,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #F8FAFC,
        #EEF7FF
    );
}

header{
    height:80px;
    padding:0 60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo img{
    height:150px;
    padding-top: 50px;
}

nav{
    display:flex;
    gap:35px;
}

nav a{
    text-decoration:none;
    color:var(--dark);
    font-weight:600;
}

main{
    height:calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero{
    width:min(1000px,90%);
    text-align:center;
}

.badge{
    display:inline-block;
    padding:10px 18px;
    border-radius:50px;
    background:#E8F2FF;
    color:var(--primary);
    font-weight:700;
    margin-bottom:25px;
}

h1{
    font-size:68px;
    font-weight:800;
    color:var(--dark);
    line-height:1.2;
}

.highlight{
    background:linear-gradient(
        90deg,
        #1E88FF,
        #17D4B3
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sub{
    margin-top:20px;
    color:var(--gray);
    font-size:20px;
}

.ai-box{
    margin-top:50px;
    background:white;
    border-radius:28px;
    padding:18px;
    box-shadow:
    0 20px 50px rgba(0,0,0,.08);
}

.ai-box textarea{
    width:100%;
    border:none;
    outline:none;
    resize:none;
    height:100px;
    font-size:18px;
    padding:20px;
}

.bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

.tags{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.tag{
    background:#F1F5F9;
    padding:10px 14px;
    border-radius:30px;
    font-size:14px;
}

.ask{
    border:none;
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:700;
    padding:16px 28px;
    border-radius:14px;
    background:linear-gradient(
        135deg,
        #1E88FF,
        #17D4B3
    );
}

.features{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:35px;
}

.feature{
    background:white;
    padding:18px 25px;
    border-radius:18px;
    min-width:220px;
    box-shadow:
    0 5px 15px rgba(0,0,0,.05);
}

.feature strong{
    display:block;
    margin-bottom:8px;
    color:var(--dark);
}

.feature span{
    color:var(--gray);
    font-size:14px;
}
@media (max-width: 768px) {

    body{
        overflow:auto;
    }

    header{
        padding:20px;
        flex-direction:column;
        gap:15px;
    }

    .logo img{
        height:45px;
    }

    nav{
        gap:18px;
        flex-wrap:wrap;
        justify-content:center;
    }

    nav a{
        font-size:14px;
    }

    main{
        height:auto;
        padding:30px 0 50px;
    }

    .hero{
        width:92%;
    }

    .badge{
        font-size:13px;
    }

    h1{
        font-size:36px;
        line-height:1.3;
    }

    .sub{
        font-size:16px;
        padding:0 10px;
    }

    .ai-box{
        margin-top:30px;
        border-radius:20px;
    }

    .ai-box textarea{
        height:90px;
        font-size:16px;
        padding:15px;
    }

    .bottom{
        flex-direction:column;
        gap:15px;
    }

    .tags{
        justify-content:center;
    }

    .tag{
        font-size:12px;
        padding:8px 12px;
    }

    .ask{
        width:100%;
    }

    .features{
        flex-direction:column;
        margin-top:25px;
        gap:12px;
    }

    .feature{
        width:100%;
        min-width:auto;
    }
}

/* 태블릿 */

@media (min-width:769px) and (max-width:1024px){

    h1{
        font-size:52px;
    }

    .hero{
        width:90%;
    }

    .features{
        flex-wrap:wrap;
    }

    .feature{
        width:280px;
    }
}

추가로 AI 스타트업 느낌을 더 내려면 메뉴를 줄여서 아래처럼 구성하는 걸 추천합니다.

<nav>
    <a href="#">AI 집찾기</a>
    <a href="#">매물</a>
    <a href="#">로그인</a>
</nav>
</style>
</head>

<body>

<header>

<div class="logo">
    <img src="images/logo.png" alt="집찾go">
</div>

<nav>
    <a href="#">AI추천</a>
    <a href="#">매물찾기</a>
    <a href="#">지도</a>
    <a href="#">로그인</a>
</nav>

</header>

<main>

<div class="hero">

<div class="badge">
🏠 AI 부동산 플랫폼
</div>

<h1>
조건만 말하세요.<br>
<span class="highlight">AI가 집을 찾아드립니다.</span>
</h1>

<p class="sub">
출퇴근 · 예산 · 반려동물 · 학군까지 AI가 분석
</p>

<div class="ai-box">

<textarea placeholder="예) 성수동, 월세 100만원 이하, 반려동물 가능, 지하철 5분 거리"></textarea>

<div class="bottom">

<div class="tags">
<div class="tag">전세 3억 이하</div>
<div class="tag">신혼부부 추천</div>
<div class="tag">출퇴근 30분</div>
</div>

<button class="ask">
AI 집찾기
</button>

</div>

</div>

<div class="features">

<div class="feature">
<strong>AI 추천</strong>
<span>조건 분석</span>
</div>

<div class="feature">
<strong>통학·출퇴근</strong>
<span>시간 계산</span>
</div>

<div class="feature">
<strong>매물 요약</strong>
<span>장단점 분석</span>
</div>

</div>

</div>

</main>

</body>
</html>
