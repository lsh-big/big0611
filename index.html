<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집찾go</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="static/css/common.css">
<link rel="stylesheet" href="static/css/main.css">


</head>

<body>

<header>

    <div class="logo">
        <img src="static/images/logo.png" alt="집찾GO">
    </div>

    <!-- 햄버거 버튼 (모바일 전용) -->
    <button class="menu-btn" id="menuBtn">
        <i class="ti ti-menu-2"></i>
    </button>

    <nav id="mobileNav">
        <a href="templates/member/login.html">로그인</a>
        <a href="templates/member/signup.html">회원가입</a>
        <a href="templates/support/contact.html">고객센터</a>
        <a href="templates/market/trend.html">시장동향</a>
        <a href="templates/property/favorite.html">관심매물</a>
    </nav>

</header>

<main>
<div class="hero">

    <div class="badge">🏠 AI 부동산 플랫폼</div>

    <h1>
        조건만 말하세요.<br>
        <span class="highlight">AI가 집을 찾아드립니다.</span>
    </h1>

    <p class="sub">출퇴근 · 예산 · 반려동물 · 학군까지 AI가 분석</p>

    <div class="ai-box">
        <textarea placeholder="예) 성수동, 월세 100만원 이하, 반려동물 가능, 지하철 5분 거리"></textarea>
        <div class="bottom">
            <div class="tags">
                <div class="tag">전세 3억 이하</div>
                <div class="tag">신혼부부 추천</div>
                <div class="tag">출퇴근 30분</div>
            </div>
            <button
                class="ask"
                onclick="location.href='/templates/property/recommend.html'">

                    AI 집찾기

            </button>
        </div>
    </div>

    <div class="features">

        <a href="templates/property/recommend.html" class="feature f-ai">
            <i class="ti ti-robot feature-icon"></i>
            <strong>AI 추천</strong>
            <span>조건 분석</span>
        </a>

        <a href="templates/property/map.html" class="feature f-commute">
            <i class="ti ti-train feature-icon"></i>
            <strong>통학·출퇴근</strong>
            <span>시간 계산</span>
        </a>

        <a href="templates/property/search.html" class="feature f-summary">
            <i class="ti ti-file-description feature-icon"></i>
            <strong>매물 요약</strong>
            <span>장단점 분석</span>
        </a>

        <a href="index.html" class="feature f-main">
            <i class="ti ti-home feature-icon"></i>
            <strong>메인 페이지</strong>
            <span>메인 페이지</span>
        </a>

    </div>

</div>
</main>

<script src="static/js/common.js"></script>
<script src="static/js/main.js"></script>

</body>
</html>
